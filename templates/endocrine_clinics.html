{% extends "layouts/base_patient.html" %}

{% block content %}

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/endocrine_clinics.css') }}">

<div class="dashboard">

    <div class="dash-header">
        <h1>Ендокринологични клиники</h1>
        <p>Намерете специалист и запазете час онлайн</p>
    </div>

    <!-- CONTROLS -->
    <div class="card">
        <div class="controls">

            <input id="searchInput"
                   class="search-input"
                   placeholder="Търсене на клиника..."
                   onkeyup="searchClinic()">

            <!-- FIX: dynamic cities instead of hardcoded -->
            <select id="cityFilter" onchange="filterByCity()">
                <option value="all">Всички градове</option>

                {% if cities %}
                    {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                {% else %}
                    <option value="София">София</option>
                    <option value="Пловдив">Пловдив</option>
                    <option value="Варна">Варна</option>
                    <option value="Бургас">Бургас</option>
                {% endif %}

            </select>

            <button onclick="findNearest()">
                📍 Моето местоположение
            </button>

        </div>
    </div>

    <!-- MAP -->
    <div class="card">
        <h3>Карта</h3>
        <div id="map" style="height:500px;"></div>
    </div>

    <!-- LIST -->
    <div class="card">
        <h3>Специалисти</h3>
        <div id="clinicList" class="clinic-list"></div>
    </div>

</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<div id="calendar"></div>

<!-- LOADING STATE -->
<div id="loading" style="display:none; text-align:center; color:#94a3b8;">
    Зареждане на клиники...
</div>

<div id="emptyState" style="display:none; text-align:center; color:#94a3b8;">
    Няма намерени клиники
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="{{ url_for('static', filename='js/endocrine_clinics.js') }}"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    // SAFE INIT
    if (typeof initMap === "function") {
        initMap();
    }

    // optional UX safety
    if (typeof loadClinics === "function") {
        loadClinics();
    }

});
</script>

{% endblock %}
