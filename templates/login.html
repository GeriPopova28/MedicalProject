<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в системата</title>

    <!-- External resources -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- External CSS -->
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

<div class="login-box">

    <h2 id="title">Вход в системата</h2>

    <div class="input-group">
        <i class="fas fa-user"></i>
        <input class="input" id="username" placeholder="Потребител">
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input class="input" id="password" type="password" placeholder="Парола">
    </div>

    <div id="roleBox" style="display:none;">
        <div class="roles">

            <label class="role">
                <input type="radio" name="role" value="Doctor" checked>
                <div>👨‍⚕️ Лекар</div>
            </label>

            <label class="role">
                <input type="radio" name="role" value="Patient">
                <div>👤 Пациент</div>
            </label>

        </div>
    </div>

    <div class="password-strength-wrapper" id="strengthWrapper">

        <div id="strengthText"
             style="font-size:12px; margin-bottom:5px; color:#93c5fd;">
            Сила на паролата:
        </div>

        <div class="strength-bg">
            <div id="strengthBar" class="strength-bar"></div>
        </div>

    </div>

    <button class="btn" onclick="submitForm()" id="loginBtn">
        Вход
    </button>

    <div class="switch">
        <span id="switchText">Нямаш акаунт?</span>
        <a onclick="toggle()" id="toggleBtn">Регистрация</a>
    </div>

</div>

<!-- External JS -->
<script src="/static/js/auth.js"></script>

</body>
</html>
