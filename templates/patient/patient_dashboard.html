{% extends 'layouts/base_patient.html' %}

{% block content %}

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

.landing-page {
    min-height: 100vh;
    background: linear-gradient(
        rgba(2, 6, 23, 0.80),
        rgba(15, 23, 42, 0.92)
    ),
    url('https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?q=80&w=2070&auto=format&fit=crop');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

/* ================= HERO ================= */
.hero {
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 30px 80px;
    flex-grow: 1;
}

.hero-content {
    max-width: 900px;
}

.hero h1 {
    font-size: 68px;
    font-weight: 800;
    margin-bottom: 20px;
    background: linear-gradient(to right, #38bdf8, #2563eb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    font-size: 20px;
    line-height: 1.8;
    color: #cbd5e1;
    margin-bottom: 40px;
}

/* ================= BUTTONS ================= */
.hero-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.btn {
    text-decoration: none;
    padding: 16px 30px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    transition: 0.3s;
}

.btn-primary {
    background: #2563eb;
    color: white;
    box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
}

.btn-primary:hover {
    background: #1d4ed8;
    transform: translateY(-3px);
}

.btn-secondary {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: white;
    backdrop-filter: blur(10px);
}

.btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-3px);
}

/* ================= FEATURES ================= */
.features {
    padding: 70px 40px 100px;
}

.section-title {
    text-align: center;
    margin-bottom: 50px;
}

.section-title h2 {
    font-size: 40px;
    margin-bottom: 15px;
}

.section-title p {
    color: #94a3b8;
    font-size: 17px;
}

.feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.feature-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 35px;
    border-radius: 22px;
    transition: 0.3s;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

.feature-card:hover {
    transform: translateY(-8px);
    background: rgba(255, 255, 255, 0.08);
}

.feature-icon {
    font-size: 55px;
    margin-bottom: 20px;
}

.feature-card h3 {
    margin-bottom: 15px;
    font-size: 22px;
}

.feature-card p {
    color: #cbd5e1;
    line-height: 1.7;
}

/* ================= FOOTER ================= */
.footer {
    text-align: center;
    padding: 30px;
    color: #94a3b8;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
}

/* ================= MOBILE ================= */
@media(max-width:768px){
    .hero h1 {
        font-size: 44px;
    }
    .hero p {
        font-size: 17px;
    }
    .section-title h2 {
        font-size: 32px;
    }
}
</style>

<div class="landing-page">

    <section class="hero">
        <div class="hero-content">
            <h1>🏥 MED-AI</h1>
            <p>
                Интелигентна медицинска платформа за AI анализ, ехографски изследвания, 
                записване на часове, лекарски преглед и мониторинг на пациенти.
            </p>
            
            </div>
    </section>

    <footer class="footer">
        © 2026 MED-AI System • Intelligent Endocrine Platform
    </footer>

</div>

{% endblock %}
